apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: auth-db
  namespace: cookbookapp
spec:
  serviceName: auth-db
  replicas: 1
  selector:
    matchLabels:
      app: auth-db
  template:
    metadata:
      labels:
        app: auth-db
    spec:
      containers:
        - name: mariadb
          image: mariadb:11
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: AUTH_DB_NAME
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: AUTH_DB_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: AUTH_DB_PASSWORD
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: AUTH_DB_ROOT_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          livenessProbe:
            exec:
              command: ['mariadb-admin', '--protocol=tcp', 'ping']
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ['mariadb-admin', '--protocol=tcp', 'ping']
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: auth-db-data
