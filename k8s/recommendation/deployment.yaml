apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation
  namespace: cookbookapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recommendation
  template:
    metadata:
      labels:
        app: recommendation
    spec:
      imagePullSecrets:
        - name: dockerhub-creds
      containers:
        - name: web
          image: walaska/cookbookapp:recommendation-service
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: JWT_SECRET