apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: cookbookapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      imagePullSecrets:
        - name: dockerhub-creds
      containers:
        - name: auth
          image: walaska/cookbookapp:auth
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: production
            - name: AUTH_SERVICE_PORT
              value: "4000"
            - name: AUTH_DB_HOST
              value: auth-db
            - name: AUTH_DB_PORT
              value: "3306"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: JWT_SECRET
            - name: AUTH_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: AUTH_DB_NAME
            - name: AUTH_DB_USER
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: AUTH_DB_USER
            - name: AUTH_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: AUTH_DB_PASSWORD
