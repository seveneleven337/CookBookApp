version: '3.9'

services:
  traefik:
    image: traefik:v3.6.10
    container_name: traefik
    command:
      - '--configFile=/app/configs/traefik.toml'
    volumes:
      - ./apps/traefik/traefik.toml:/app/configs/traefik.toml:ro
      - ./apps/traefik/dynamic_conf.toml:/app/configs/dynamic_conf.toml:ro
      - ./apps/traefik/certs:/certs:ro
      - /var/run/docker.sock:/var/run/docker.sock:rw
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.traefik.rule=Host(`traefik.localhost`)'
      - 'traefik.http.routers.traefik.entrypoints=websecure'
      - 'traefik.http.routers.traefik.tls=true'
      - 'traefik.http.routers.traefik.service=api@internal'
    environment:
      - TZ=Europe/Helsinki
    ports:
      - '80:80'
      - '443:443'
    networks:
      - cookbookapp

  web:
    build:
      context: .
      dockerfile: apps/docker/Dockerfile.web
    container_name: web
    ports:
      - '${WEB_PORT}:3000'
    depends_on:
      - auth
    environment:
      RECIPE_API_URL: http://recipe-management-service:${RECIPE_MANAGEMENT_SERVICE_PORT}/api/recipes
      AUTH_API_URL: http://auth:${AUTH_SERVICE_PORT}/api/auth
      RECOMMENDED_RECIPES_URL: http://recommendation-service:${RECOMMENDATION_SERVICE_PORT}/api/recommend
      NEXT_PUBLIC_SENTRY_DSN: https://<key>@sentry.cookbook.fi/1
      SENTRY_DSN: https://<key>@sentry.cookbook.fi/1
      SENTRY_ENVIRONMENT: production

    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.web.rule=Host(`web.localhost`)'
      - 'traefik.http.routers.web.entrypoints=websecure'
      - 'traefik.http.routers.web.tls=true'
      - 'traefik.http.services.web.loadbalancer.server.port=${WEB_PORT}'
    networks:
      - cookbookapp

  auth:
    build:
      context: .
      dockerfile: apps/docker/Dockerfile.auth
    container_name: auth-service
    ports:
      - '${AUTH_SERVICE_PORT}:4000'
    depends_on:
      auth-db:
        condition: service_healthy
    environment:
      AUTH_SERVICE_PORT: ${AUTH_SERVICE_PORT}
      JWT_SECRET: ${JWT_SECRET}
      AUTH_DB_NAME: ${AUTH_DB_NAME}
      AUTH_DB_USER: ${AUTH_DB_USER}
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD}
      AUTH_DB_HOST: auth-db
      AUTH_DB_PORT: ${AUTH_DB_PORT}
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.auth.rule=Host(`auth.localhost`)'
      - 'traefik.http.routers.auth.entrypoints=websecure'
      - 'traefik.http.routers.auth.tls=true'
      - 'traefik.http.services.auth.loadbalancer.server.port=${AUTH_SERVICE_PORT}'
    networks:
      - cookbookapp

  auth-db:
    image: mariadb:11
    container_name: auth-db
    restart: always
    environment:
      MYSQL_DATABASE: ${AUTH_DB_NAME}
      MYSQL_USER: ${AUTH_DB_USER}
      MYSQL_PASSWORD: ${AUTH_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${AUTH_DB_ROOT_PASSWORD}
    ports:
      - '${AUTH_DB_PORT}:3306'
    volumes:
      - auth-db-data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mariadb-admin', '--protocol=tcp', 'ping']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - cookbookapp

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: always
    ports:
      - '6060:80'
    environment:
      PMA_HOST: auth-db
      PMA_PORT: ${AUTH_DB_PORT}
      PMA_USER: ${AUTH_DB_USER}
      PMA_PASSWORD: ${AUTH_DB_PASSWORD}
    depends_on:
      - auth-db
    volumes:
      - phpmyadmin-data:/etc/phpmyadmin
    networks:
      - cookbookapp

  recipe-management-service:
    build:
      context: .
      dockerfile: apps/docker/Dockerfile.recipe-management-service
    container_name: recipe-management-service
    ports:
      - '${RECIPE_MANAGEMENT_SERVICE_PORT}:5001'
    depends_on:
      user-db:
        condition: service_healthy
    environment:
      RECIPE_MANAGEMENT_SERVICE_PORT: '5001'
      JWT_SECRET: ${JWT_SECRET}
      RECIPE_DB_NAME: ${RECIPE_DB_NAME}
      RECIPE_DB_USER: ${RECIPE_DB_USER}
      RECIPE_DB_PASSWORD: ${RECIPE_DB_PASSWORD}
      RECIPE_DB_HOST: user-db
      RECIPE_DB_PORT: '5432'
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.recipe-management-service.rule=Host(`recipe-management.localhost`)'
      - 'traefik.http.routers.recipe-management-service.entrypoints=websecure'
      - 'traefik.http.routers.recipe-management-service.tls=true'
      - 'traefik.http.services.recipe-management-service.loadbalancer.server.port=${RECIPE_MANAGEMENT_SERVICE_PORT}'
    networks:
      - cookbookapp

  user-db:
    image: postgres:15
    container_name: user-db
    restart: always
    environment:
      POSTGRES_DB: ${RECIPE_DB_NAME}
      POSTGRES_USER: ${RECIPE_DB_USER}
      POSTGRES_PASSWORD: ${RECIPE_DB_PASSWORD}
    ports:
      - '${RECIPE_DB_PORT}:5432'
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - cookbookapp

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    ports:
      - '5050:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    depends_on:
      - user-db
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - cookbookapp

  prometheus:
    image: prom/prometheus:v3.10.0
    container_name: prometheus
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    volumes:
      - ./apps/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - '${PROMETHEUS_PORT}:9090'
    depends_on:
      - traefik
    networks:
      - cookbookapp

  grafana:
    image: grafana/grafana:12.4.0
    container_name: grafana
    restart: always
    environment:
      TZ: Europe/Helsinki
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL}
    ports:
      - '${GRAFANA_PORT}:3000'
    volumes:
      - grafana-data:/var/lib/grafana
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.grafana.rule=Host(`grafana.localhost`)'
      - 'traefik.http.routers.grafana.entrypoints=websecure'
      - 'traefik.http.routers.grafana.tls=true'
      - 'traefik.http.services.grafana.loadbalancer.server.port=3000'
    networks:
      - cookbookapp

  recommendation-service:
    build:
      context: .
      dockerfile: apps/docker/Dockerfile.recommendation
    container_name: recommendation-service
    ports:
      - '${RECOMMENDATION_SERVICE_PORT}:8000'
    environment:
      JWT_SECRET: ${JWT_SECRET}
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.recipe-management-service.rule=Host(`recommendation.localhost`)'
      - 'traefik.http.routers.recipe-management-service.entrypoints=websecure'
      - 'traefik.http.routers.recipe-management-service.tls=true'
      - 'traefik.http.services.recipe-management-service.loadbalancer.server.port=${RECOMMENDATION_SERVICE_PORT}'
    networks:
      - cookbookapp

volumes:
  auth-db-data:
  phpmyadmin-data:
  user-db-data:
  pgadmin-data:
  grafana-data:
  prometheus-data:

networks:
  cookbookapp:
    name: cookbookapp
    driver: bridge
