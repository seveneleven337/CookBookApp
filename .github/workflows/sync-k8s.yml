name: Sync k8s Manifests

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which manifests to apply"
        required: true
        type: choice
        default: all
        options:
          - all
          - auth
          - recipe-management
          - web
          - monitoring

permissions:
  contents: read
  id-token: write

jobs:
  sync-and-apply:
    name: Sync & Apply (${{ github.event.inputs.target }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Resolve source path
        id: paths
        run: |
          if [ "${{ github.event.inputs.target }}" = "all" ]; then
            echo "local=k8s" >> $GITHUB_OUTPUT
            echo "remote=/tmp/k8s-sync/" >> $GITHUB_OUTPUT
            echo "apply_flag=--recursive" >> $GITHUB_OUTPUT
          else
            echo "local=k8s${{ github.event.inputs.target }}/" >> $GITHUB_OUTPUT
            echo "remote=/tmp/k8s-sync/${{ github.event.inputs.target }}/" >> $GITHUB_OUTPUT
            echo "apply_flag=" >> $GITHUB_OUTPUT
          fi

      - name: Populate secrets
        env:
          AUTH_JWT_SECRET: ${{ secrets.AUTH_JWT_SECRET }}
          AUTH_DB_PASSWORD: ${{ secrets.AUTH_DB_PASSWORD }}
          AUTH_DB_ROOT_PASSWORD: ${{ secrets.AUTH_DB_ROOT_PASSWORD }}
          RECIPE_DB_PASSWORD: ${{ secrets.RECIPE_DB_PASSWORD }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          GRAFANA_ROOT_URL: ${{ secrets.GRAFANA_ROOT_URL }}
          RECIPE_SERVICE_URL: ${{ secrets.RECIPE_SERVICE_URL }}
          AUTH_SERVICE_URL: ${{ secrets.AUTH_SERVICE_URL }}
        run: |
          find k8s -name "secret.yaml" -o -name "*-secret.yaml" | while read f; do
            envsubst < "$f" > "$f.tmp" && mv "$f.tmp" "$f"
          done

      - name: Copy manifests to VM
        run: |
          gcloud compute scp \
            --recurse \
            --tunnel-through-iap \
            --zone=${{ secrets.GCP_ZONE }} \
            --project=${{ secrets.GCP_PROJECT }} \
            k8s \
            ${{ secrets.GCP_K3S_VM }}:/tmp/k8s-sync/
