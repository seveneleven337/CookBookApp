version: '3.9'

services:
  web:
    build:
      context: .
      dockerfile: apps/docker/Dockerfile.web
    container_name: web
    ports:
      - '${WEB_PORT}:3000'
    depends_on:
      - auth
    environment:
      AUTH_SERVICE_URL: http://auth:${AUTH_SERVICE_PORT}

  auth:
    build:
      context: .
      dockerfile: apps/docker/Dockerfile.auth
    container_name: auth-service
    ports:
      - '${AUTH_SERVICE_PORT}:4000'
    depends_on:
      - auth-db
    environment:
      DATABASE_URL: ${DATABASE_URL}

  auth-db:
    image: postgres:15
    container_name: auth-db
    restart: always
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME}
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
    ports:
      - '${AUTH_DB_PORT}:5432'
    volumes:
      - auth-db-data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    ports:
      - '5050:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    depends_on:
      - auth-db
    volumes:
      - pgadmin-data:/var/lib/pgadmin

volumes:
  auth-db-data:
  pgadmin-data:
