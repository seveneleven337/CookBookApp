apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: cookbookapp
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']

      - job_name: traefik
        static_configs:
          - targets: ['traefik.kube-system.svc.cluster.local:9100']
