apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web
  namespace: cookbookapp
spec:
  ingressClassName: traefik
  rules:
    - host: web.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 3000
