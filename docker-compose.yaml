version: '3.9'

services:
  web:
    build:
      context: .
      dockerfile: apps/docker/Dockerfile.web
    container_name: web
    ports:
      - '${WEB_PORT}:3000'
    depends_on:
      - auth
    environment:
      AUTH_SERVICE_URL: http://auth:${AUTH_SERVICE_PORT}

  auth:
    build:
      context: .
      dockerfile: apps/docker/Dockerfile.auth
    container_name: auth-service
    ports:
      - '${AUTH_SERVICE_PORT}:4000'
    depends_on:
      auth-db:
        condition: service_healthy
    environment:
      AUTH_SERVICE_PORT: ${AUTH_SERVICE_PORT}
      JWT_SECRET: ${JWT_SECRET}
      AUTH_DB_NAME: ${AUTH_DB_NAME}
      AUTH_DB_USER: ${AUTH_DB_USER}
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD}
      AUTH_DB_HOST: auth-db
      AUTH_DB_PORT: ${AUTH_DB_PORT}

  auth-db:
    image: mariadb:11
    container_name: auth-db
    restart: always
    environment:
      MYSQL_DATABASE: ${AUTH_DB_NAME}
      MYSQL_USER: ${AUTH_DB_USER}
      MYSQL_PASSWORD: ${AUTH_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${AUTH_DB_ROOT_PASSWORD}
    ports:
      - '${AUTH_DB_PORT}:3306'
    volumes:
      - auth-db-data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mariadb-admin', '--protocol=tcp', 'ping']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: always
    ports:
      - '6060:80'
    environment:
      PMA_HOST: auth-db
      PMA_PORT: ${AUTH_DB_PORT}
      PMA_USER: ${AUTH_DB_USER}
      PMA_PASSWORD: ${AUTH_DB_PASSWORD}
    depends_on:
      - auth-db
    volumes:
      - phpmyadmin-data:/etc/phpmyadmin

  kalle-db:
    image: postgres:15
    container_name: kalle-db
    restart: always
    environment:
      POSTGRES_DB: ${KALLE_DB_NAME}
      POSTGRES_USER: ${KALLE_DB_USER}
      POSTGRES_PASSWORD: ${KALLE_DB_PASSWORD}
    ports:
      - '${KALLE_DB_PORT}:5432'
    volumes:
      - kalle-db-data:/var/lib/postgresql/data
  # This is used to ensure correct schema is applied to the database
  user-recipe-migrate:
    image: postgres:15
    container_name: user-recipe-migrate
    depends_on:
      user-db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${USER_DB_PASSWORD}
      USER_DB_USER: ${USER_DB_USER}
      USER_DB_NAME: ${USER_DB_NAME}
    volumes:
      - ./apps/user-recipe-api/sql/schema.sql:/schema.sql
    command: sh -c "psql -h user-db -U $$USER_DB_USER -d $$USER_DB_NAME -f /schema.sql"

  user-recipe-api:
    build:
      context: .
      dockerfile: apps/docker/Dockerfile.user-recipe-api
    container_name: user-recipe-api
    ports:
      - '${USER_RECIPE_API_PORT}:5001'
    depends_on:
      user-recipe-migrate:
        condition: service_completed_successfully
      user-db:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${USER_DB_USER}:${USER_DB_PASSWORD}@user-db:5432/${USER_DB_NAME}
      PORT: '5001'

  user-db:
    image: postgres:15
    container_name: user-db
    restart: always
    environment:
      POSTGRES_DB: ${USER_DB_NAME}
      POSTGRES_USER: ${USER_DB_USER}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD}
    ports:
      - '${USER_DB_PORT}:5432'
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    ports:
      - '5050:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    depends_on:
      - kalle-db
    volumes:
      - pgadmin-data:/var/lib/pgadmin

volumes:
  auth-db-data:
  kalle-db-data:
  phpmyadmin-data:
  user-db-data:
  pgadmin-data:
