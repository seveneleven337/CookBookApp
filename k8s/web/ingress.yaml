apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web
  namespace: cookbookapp
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - cookbook.fi
      secretName: cloudflare-tls
  rules:
    - host: cookbook.fi
      http:
        paths:
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 4000
          - path: /api/recipes
            pathType: Prefix
            backend:
              service:
                name: recipe-management
                port:
                  number: 5001
          - path: /api/recommend
            pathType: Prefix
            backend:
              service:
                name: recommendation
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 3000
