name: Deploy to k3s

on:
  push:
    branches:
      - release

permissions:
  contents: read
  id-token: write

env:
  IMAGE_REPO: walaska/cookbookapp

jobs:
  build-and-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: auth
            dockerfile: apps/docker/Dockerfile.auth
          - service: recipe-management
            dockerfile: apps/docker/Dockerfile.recipe-management-service
          - service: web
            dockerfile: apps/docker/Dockerfile.web

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.IMAGE_REPO }}:${{ matrix.service }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
