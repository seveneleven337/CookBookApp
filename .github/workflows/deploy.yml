name: Deploy to k3s

on:
  push:
    branches:
      - release

permissions:
  contents: read
  id-token: write

env:
  IMAGE_REPO: walaska/cookbookapp

jobs:
  build-and-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: auth
            dockerfile: apps/docker/Dockerfile.auth
          - service: recipe-management
            dockerfile: apps/docker/Dockerfile.recipe-management-service
          - service: web
            dockerfile: apps/docker/Dockerfile.web
          - service: recommendation
            dockerfile: apps/docker/Dockerfile.recommendation

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.IMAGE_REPO }}:${{ matrix.service }}-${{ github.sha }}
          build-args: |
            RECIPE_API_URL=${{ secrets.RECIPE_SERVICE_URL }}
            AUTH_API_URL=${{ secrets.AUTH_SERVICE_URL }}
            RECOMMENDED_RECIPES_URL=${{ secrets.RECOMMENDED_RECIPES_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy all services
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Roll out all services
        run: |
          gcloud compute ssh ${{ secrets.GCP_K3S_VM }} \
            --tunnel-through-iap \
            --zone=${{ secrets.GCP_ZONE }} \
            --project=${{ secrets.GCP_PROJECT }} \
            --quiet \
            --command="
              sudo kubectl set image deployment/auth auth=${{ env.IMAGE_REPO }}:auth-${{ github.sha }} -n cookbookapp &&
              sudo kubectl set image deployment/recipe-management recipe-management=${{ env.IMAGE_REPO }}:recipe-management-${{ github.sha }} -n cookbookapp &&
              sudo kubectl set image deployment/web web=${{ env.IMAGE_REPO }}:web-${{ github.sha }} -n cookbookapp &&
              sudo kubectl set image deployment/recommendation recommendation=${{ env.IMAGE_REPO }}:recommendation-${{ github.sha }} -n cookbookapp &&
              sudo kubectl rollout status deployment/auth -n cookbookapp --timeout=120s &&
              sudo kubectl rollout status deployment/recipe-management -n cookbookapp --timeout=120s &&
              sudo kubectl rollout status deployment/web -n cookbookapp --timeout=120s
            "
