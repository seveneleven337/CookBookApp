apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auth
  namespace: cookbookapp
spec:
  ingressClassName: traefik
  rules:
    - host: auth.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 4000
