apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: recipe-management
  namespace: cookbookapp
spec:
  ingressClassName: traefik
  rules:
    - host: recipe-management.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: recipe-management
                port:
                  number: 5001
